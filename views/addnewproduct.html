<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Product</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://kit.fontawesome.com/e53d7a7b30.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- <div class="container-fluid"> -->
    <!-- Modal -->
<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-lg addnewproductpage">
    <div class="modal-content bg-light">

      <!-- Header -->
      <div class="modal-header border-bottom">
        <div>
          <h5 class="modal-title text-dark fw-bold">
            <span class="bg-success text-light px-2 py-1 rounded me-2">+</span>
            Add New Product
          </h5>
          <small class="text-muted">Register a new item into the hardware inventory system.</small>
        </div>
        <button class="btn-close"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- Product Name -->
        <div class="mb-3">
          <label class="form-label text-dark">Product Name *</label>
          <input type="text" class="form-control" placeholder="e.g., Heavy Duty Cement Mixer 200L">
        </div>

        <!-- Row -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label text-dark">Category *</label>
            <select class="form-control">
              <option>Construction Tools</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label text-dark">Supplier (Optional)</label>
            <select class="form-control">
              <option>Select supplier</option>
            </select>
          </div>
        </div>

        <!-- Row -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label text-dark">Initial Stock Quantity *</label>
            <input type="number" class="form-control" placeholder="0">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label text-dark">Date Received *</label>
            <input type="date" class="form-control">
          </div>
        </div>

        <hr>

        <!-- Pricing -->
        <h6 class="text-dark fw-bold">
          PRICING DETAILS 
          <span class="badge bg-light text-dark">Currency: UGX</span>
        </h6>

        <div class="row mt-2">
          <div class="col-md-6 mb-3">
            <label class="form-label text-dark">Cost Price (Buying) *</label>
            <input type="number" class="form-control" placeholder="UGX 0.00">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label text-dark">Selling Price (Retail) *</label>
            <input type="number" class="form-control" placeholder="UGX 0.00">
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer d-flex justify-content-between">

        <small class="text-muted">Fields marked with * are required</small>

        <div>
          <button class="btn btn-outline-dark">Cancel</button>
          <button class="btn bg-success text-light">Add Product</button>
        </div>

      </div>

    </div>
  </div>
</div>

  <!-- </div> -->
</body>
</html>
